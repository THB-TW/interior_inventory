server {
    # Nginx 監聽 80 port
    listen 80;

    # 所有一般頁面請求
    location / {
        root /usr/share/nginx/html;  # 靜態檔案放這裡
        # SPA 路由關鍵設定：找不到檔案就回傳 index.html
        # 這樣 React Router 的 /finance/bonus 這類網址才不會 404
        try_files $uri $uri/ /index.html;
    }

    # /api 開頭的請求轉發到後端容器
    # app 是 docker-compose.yml 裡定義的服務名稱
    # location /api/ {
    #     proxy_pass http://app:8080/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
    location /api/ {
        proxy_pass https://interiorinventory-production.up.railway.app/;
        proxy_set_header Host interiorinventory-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }
}