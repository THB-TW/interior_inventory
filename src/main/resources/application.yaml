spring:
  application:
    name: interior-inventory

  # 資料來源設定（請依你的 Docker / 本機環境調整）
  datasource:
    url: ${SPRING_DATASOURCE_NEWURL} #jdbc:postgresql://localhost:5432/order_inventory_db 要在本地的話變數名稱後面拿掉NEW
    username: ${SPRING_DATASOURCE_USERNAME:order_user}
    password: ${SPRING_DATASOURCE_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 600000
      initialization-fail-timeout: 0    # 連線失敗不 crash，一直重試
      connection-timeout: 30000         # 等 30 秒拿不到連線才算失敗

  jpa:
    hibernate:
      ddl-auto: none    # 因為你已經用 schema.sql 建好表，這裡設 none
    show-sql: true      # 開發階段可以先開，方便看到 SQL
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

spring.servlet.multipart.max-file-size: 5MB
spring.servlet.multipart.max-request-size: 5MB

line:
  bot:
    channel-secret: ${LINE_CHANNEL_SECRET}
    channel-token:  ${LINE_CHANNEL_TOKEN}
    handler:
      path: /webhook/line

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG      # 如果 SQL 太吵，可以改回 INFO